<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Epic Games Login Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="containerMaster">
      <h1>Entre na Epic Games</h1>
      <div class="consoles">
        <p>Somente no console? Entre para acessar seu progresso e suas compras</p>
        <div class="loginPlaystation">
          <div class="playstationIcon">
            <img src="../images/PlayStation-Icon-White-Logo.wine.svg" alt="playstation_icon" />
          </div>
          <p>Playstation Network</p>
        </div>
        <div class="loginXbox">
          <div class="xboxIcon">
            <img src="../images/icons8-xbox.svg" alt="xbox_icon" />
          </div>
          <p>Rede Xbox</p>
        </div>
        <div class="loginNintendo">ascca</div>
      </div>
      <div class="emailLogin"></div>
      <div class="createAccount"></div>
      <div class="otherLogin"></div>
      <p>Problemas para entrar na sua conta?</p>
      <p>Política de Privacidade</p>
    </div>
  </body>
</html>
